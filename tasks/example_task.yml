---
# This is an example task file. Adapt it to your needs, but make sure to follow the structure and include all necessary information for the task and the rubric.


# Meta information about the task
name: "Write an incident postmortem"
version: "1.0"


# The task description. Should be clear and specific, providing all necessary information. Should be very clear on the expected output format.
# The task description will only be visible to the runner LLM, not to the judge LLM.
task:
    # General context for the runner LLM.
    context: |
      You are a senior engineer at a tech company. An incident has just been resolved and you need to write the official postmortem report for your team and stakeholders.

    # The main instruction describing what the runner LLM should produce.
    description: |
      The following incident occurred. Write a complete postmortem report for it.

      INCIDENT DESCRIPTION:
      On Tuesday at 2:47 AM UTC, the payment processing service became unresponsive. The on-call engineer was paged at 2:51 AM. Investigation revealed that a database migration deployed at 11:30 PM the previous evening had added an unindexed foreign key lookup to the most frequent payment query. Under overnight batch processing load, query times degraded from 12ms to 45 seconds, causing connection pool exhaustion. The payment service was fully down from 3:04 AM to 4:38 AM UTC. Approximately 2,300 payment attempts failed during the outage. The fix was to add the missing index, which was deployed at 4:31 AM and fully resolved by 4:38 AM.

      Write the postmortem report as plain text or markdown. Include all key details.


# The rubric for evaluating the response. Should be clear and specific, providing all necessary information for the judge LLM to score the response.
# The rubric will only be visible to the judge LLM, not to the runner LLM.
rubric:
    # General context for the judge LLM.
    context: |
      This is a postmortem for a payment service outage caused by a missing database index on a foreign key introduced in a migration. The incident lasted approximately 94 minutes with ~2,300 failed payment attempts. A good postmortem is specific, actionable, and structured — it should allow any engineer who was not present to fully understand what happened, why, and what will be done to prevent recurrence.

    # Detailed scoring criteria.
    criteria:
      - name: Timeline
        points: 20
        levels:
          - range: [0, 8]
            description: "No timeline present, or a vague narrative without specific times."
          - range: [9, 14]
            description: "Timeline present but incomplete — missing key events or uses approximate times."
          - range: [15, 20]
            description: "Clear chronological timeline with specific timestamps covering detection, investigation, mitigation, and resolution."

      - name: Root cause analysis
        points: 25
        levels:
          - range: [0, 10]
            description: "Root cause missing, vague ('database issue'), or incorrect."
          - range: [11, 18]
            description: "Root cause identified but causation chain is incomplete — does not explain why the migration caused the failure."
          - range: [19, 25]
            description: "Root cause clearly identified with full causation chain: migration added unindexed FK → query degraded → connection pool exhausted → service down."

      - name: Impact assessment
        points: 20
        levels:
          - range: [0, 8]
            description: "Impact vague or absent ('some users were affected')."
          - range: [9, 14]
            description: "Impact partially quantified — mentions the outage but missing duration, user count, or affected service."
          - range: [15, 20]
            description: "Impact fully quantified: duration (~94 min), users/transactions affected (~2,300 failed payments), and service scope (payment processing)."

      - name: Action items
        points: 25
        levels:
          - range: [0, 10]
            description: "No action items, or generic items with no owner or timeline ('we will improve monitoring')."
          - range: [11, 18]
            description: "Action items present but incomplete — some lack owners, deadlines, or specificity."
          - range: [19, 25]
            description: "At least 3 specific, actionable items each with a clear owner role and deadline (e.g., 'Add migration linter to CI to flag unindexed FKs — Platform team — 2 weeks')."

      - name: Executive summary
        points: 10
        levels:
          - range: [0, 4]
            description: "No summary, or one that requires reading the full document to understand what happened."
          - range: [5, 7]
            description: "Summary present but missing severity, duration, or impact at a glance."
          - range: [8, 10]
            description: "Concise summary (3–5 sentences) covering severity, affected service, duration, and user impact — readable standalone."
